<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>动态转发后台</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #f9fbfc;
      --text: #18212d;
      --muted: #677489;
      --line: #dde4ea;
      --line-strong: #c8d2db;
      --accent: #0f766e;
      --accent-2: #d97706;
      --danger: #b42318;
      --success: #147d4f;
      --focus: #9edbd4;
      --shadow: 0 18px 45px rgba(24, 33, 45, 0.09);
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 7px 11px;
      cursor: pointer;
      font-weight: 650;
      background: var(--accent);
      color: #fff;
      white-space: nowrap;
    }
    button:hover { filter: brightness(0.96); }
    button:disabled { cursor: progress; opacity: 0.65; }
    button.secondary {
      background: var(--surface);
      border-color: var(--line-strong);
      color: var(--text);
    }
    button.danger {
      background: var(--danger);
      color: #fff;
    }
    input, select, textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, select:focus, textarea:focus, button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 1px;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 22px; line-height: 1.15; }
    h2 { font-size: 16px; line-height: 1.2; }
    h3 { font-size: 14px; line-height: 1.25; }
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.11), transparent 42%),
        linear-gradient(315deg, rgba(217, 119, 6, 0.12), transparent 48%),
        var(--bg);
    }
    .login-panel {
      width: min(430px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .login-panel p {
      margin: 8px 0 18px;
      color: var(--muted);
    }
    .login-form { display: grid; gap: 12px; }
    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 256px minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
      z-index: 4;
    }
    .brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--line);
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      margin-bottom: 12px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }
    .brand strong { display: block; font-size: 16px; }
    .brand span { color: var(--muted); font-size: 12px; }
    .nav {
      display: grid;
      gap: 4px;
      padding: 14px 10px;
    }
    .nav button {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      min-height: 42px;
      padding: 8px 10px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      text-align: left;
      font-weight: 650;
    }
    .nav button:hover {
      background: var(--surface-2);
      color: var(--text);
      filter: none;
    }
    .nav button.active {
      background: #e8f5f3;
      color: var(--accent);
    }
    .nav-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      border: 1px solid currentColor;
      font-size: 11px;
      line-height: 1;
    }
    .sidebar-footer {
      margin-top: auto;
      padding: 12px 10px 16px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 8px;
    }
    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(244, 246, 248, 0.88);
      backdrop-filter: blur(10px);
    }
    .topbar-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }
    .topbar-title span {
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .menu-button { display: none; }
    main {
      min-width: 0;
      padding: 22px;
    }
    .message {
      min-height: 20px;
      margin-bottom: 12px;
      color: var(--muted);
    }
    .message.error { color: var(--danger); }
    .page {
      display: grid;
      gap: 16px;
    }
    .page[hidden] { display: none !important; }
    .page-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }
    .panel {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 8px 28px rgba(24, 33, 45, 0.045);
    }
    .panel.full { grid-column: span 12; }
    .panel.half { grid-column: span 6; }
    .panel.third { grid-column: span 4; }
    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .panel-head p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
    }
    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
    }
    .stat b {
      display: block;
      margin-bottom: 3px;
      font-size: 26px;
      line-height: 1.05;
    }
    .stat span { color: var(--muted); font-size: 12px; }
    .forms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 11px;
    }
    .form-field {
      display: grid;
      gap: 5px;
    }
    .form-field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .full-width { grid-column: 1 / -1; }
    .form-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      align-self: end;
    }
    .toolbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .toolbar .form-field {
      min-width: min(360px, 100%);
      flex: 1 1 320px;
    }
    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .field-hint {
      color: var(--muted);
      font-size: 12px;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
    }
    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }
    tr:last-child td { border-bottom: 0; }
    .table-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #edf1f5;
      color: #405064;
      font-size: 12px;
      font-weight: 700;
    }
    .pill.ok { background: #e7f7ef; color: var(--success); }
    .pill.bad { background: #fdeceb; color: var(--danger); }
    .pill.warn { background: #fff3df; color: var(--accent-2); }
    .muted { color: var(--muted); }
    .platform-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      align-items: stretch;
    }
    .platform-card {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(24, 33, 45, 0.045);
    }
    .platform-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .platform-title {
      display: grid;
      gap: 5px;
      min-width: 0;
    }
    .platform-title h3 {
      font-size: 16px;
      overflow-wrap: anywhere;
    }
    .platform-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .platform-account {
      display: grid;
      gap: 4px;
      padding: 10px;
      border-radius: 8px;
      background: var(--surface-2);
    }
    .platform-account strong {
      overflow-wrap: anywhere;
    }
    .platform-actions {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .platform-actions button {
      flex: 1 1 94px;
    }
    .platform-message {
      min-height: 20px;
      color: var(--muted);
    }
    .platform-message.error { color: var(--danger); }
    .qr-box {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .qr-box img {
      width: 220px;
      height: 220px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(24, 33, 45, 0.36);
      z-index: 10;
    }
    .modal {
      width: min(420px, 100%);
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .modal h2 { margin-bottom: 12px; }
    .modal.login-modal {
      width: min(460px, 100%);
    }
    .modal.action-modal {
      width: min(560px, 100%);
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }
    .toast-stack {
      position: fixed;
      right: 18px;
      top: 18px;
      width: min(360px, calc(100vw - 36px));
      display: grid;
      gap: 10px;
      z-index: 30;
      pointer-events: none;
    }
    .toast {
      display: grid;
      gap: 4px;
      padding: 12px 13px;
      border: 1px solid #b7d9d4;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      box-shadow: var(--shadow);
      pointer-events: auto;
      cursor: pointer;
    }
    .toast strong {
      color: var(--accent);
      font-size: 13px;
    }
    .toast span {
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .toast.error {
      border-color: #f1b8b2;
    }
    .toast.error strong {
      color: var(--danger);
    }
    @media (max-width: 1080px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        width: min(286px, calc(100vw - 34px));
        transform: translateX(-105%);
        transition: transform 0.18s ease;
        box-shadow: var(--shadow);
      }
      body.sidebar-open .sidebar { transform: translateX(0); }
      .menu-button { display: inline-flex; }
      .topbar { align-items: flex-start; }
    }
    @media (max-width: 820px) {
      main { padding: 14px; }
      .topbar { padding: 14px; flex-direction: column; }
      .top-actions { width: 100%; }
      .panel.half, .panel.third { grid-column: span 12; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      table { min-width: 640px; }
    }
  </style>
</head>
<body>
  <section id="loginView" class="login-shell">
    <div class="login-panel">
      <div class="brand-mark">动</div>
      <h1>动态转发后台</h1>
      <p>输入本机管理 token 后进入控制台。</p>
      <form id="loginForm" class="login-form">
        <input id="loginToken" type="password" placeholder="管理 token" autocomplete="current-password" autofocus>
        <button id="loginButton" type="submit">登录</button>
        <div id="loginMessage" class="message"></div>
      </form>
    </div>
  </section>

  <section id="appView" class="app-shell" hidden>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">动</div>
        <strong>动态转发后台</strong>
        <span>本机管理控制台</span>
      </div>
      <nav class="nav" aria-label="后台功能">
        <button class="active" data-nav="overview"><span class="nav-icon">览</span><span>概览</span></button>
        <button data-nav="login"><span class="nav-icon">登</span><span>平台登录</span></button>
        <button data-nav="subscriptions"><span class="nav-icon">订</span><span>订阅管理</span></button>
        <button data-nav="entities"><span class="nav-icon">源</span><span>发布者与目标</span></button>
        <button data-nav="filters"><span class="nav-icon">滤</span><span>过滤规则</span></button>
        <button data-nav="templates"><span class="nav-icon">模</span><span>模板绑定</span></button>
      </nav>
      <div class="sidebar-footer">
        <button class="secondary" id="refresh">刷新</button>
        <button class="secondary" id="logout">退出登录</button>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <button class="secondary menu-button" id="mobileMenu">菜单</button>
        <div class="topbar-title">
          <h1 id="pageTitle">概览</h1>
          <span id="pageSubtitle">运行状态与插件健康情况。</span>
        </div>
        <div class="top-actions">
          <span class="pill" id="connectionState">本机</span>
        </div>
      </header>

      <main>
        <section class="page" data-page="overview">
          <div class="stats" id="stats"></div>
          <div class="page-grid">
            <section class="panel full">
              <div class="panel-head">
                <div>
                  <h2>插件</h2>
                  <p>查看已加载插件的状态与能力。</p>
                </div>
              </div>
              <div class="table-wrap"><table id="plugins"></table></div>
            </section>
          </div>
        </section>

        <section class="page" data-page="login" hidden>
          <div class="page-grid">
            <section class="panel full">
              <div class="panel-head">
                <div>
                  <h2>平台登录</h2>
                  <p>按动态源平台查看登录状态，并选择对应登录方式。</p>
                </div>
                <button class="secondary" id="refreshPlatformLogins">刷新登录状态</button>
              </div>
              <div id="platformLoginList" class="platform-list"></div>
            </section>
          </div>
        </section>

        <section class="page" data-page="subscriptions" hidden>
          <div class="page-grid">
            <section class="panel full">
              <div class="panel-head">
                <div>
                  <h2>订阅关系</h2>
                  <p>当前发布者到消息目标的转发关系。</p>
                </div>
                <button id="openCreateSubscription">创建订阅</button>
              </div>
              <div class="table-wrap"><table id="subscriptions"></table></div>
            </section>
          </div>
        </section>

        <section class="page" data-page="entities" hidden>
          <div class="page-grid">
            <section class="panel full">
              <div class="panel-head">
                <div>
                  <h2>发布者</h2>
                  <p>动态源账号，可编辑名称和状态。</p>
                </div>
              </div>
              <div class="table-wrap"><table id="publishers"></table></div>
            </section>
            <section class="panel full">
              <div class="panel-head">
                <div>
                  <h2>消息目标</h2>
                  <p>接收渲染消息的群、用户和频道。</p>
                </div>
              </div>
              <div class="table-wrap"><table id="subscribers"></table></div>
            </section>
          </div>
        </section>

        <section class="page" data-page="filters" hidden>
          <div class="page-grid">
            <section class="panel full">
              <div class="panel-head">
                <div>
                  <h2>过滤规则</h2>
                  <p>选择订阅查看规则，或查看全部规则。</p>
                </div>
                <button id="openAddFilter">添加过滤规则</button>
              </div>
              <div class="toolbar">
                <div class="form-field">
                  <label for="filterScopeSubscriptionId">订阅范围</label>
                  <select id="filterScopeSubscriptionId">
                    <option value="">全部订阅</option>
                  </select>
                </div>
                <div class="toolbar-actions">
                  <button class="secondary" id="loadFilters">加载</button>
                  <button class="danger" id="clearFilters">清空当前订阅</button>
                </div>
              </div>
              <div class="table-wrap"><table id="filters"></table></div>
            </section>
          </div>
        </section>

        <section class="page" data-page="templates" hidden>
          <div class="page-grid">
            <section class="panel full">
              <div class="panel-head">
                <div>
                  <h2>模板与绑定</h2>
                  <p>模板来自配置文件，绑定关系存储在数据库中。</p>
                </div>
                <button id="openTemplateBinding">绑定模板</button>
              </div>
              <div class="table-wrap"><table id="templates"></table></div>
            </section>
          </div>
        </section>
      </main>
    </div>
  </section>

  <div id="editModal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <h2 id="editTitle">编辑</h2>
      <div class="forms">
        <div class="form-field full-width">
          <label for="editName">名称</label>
          <input id="editName">
        </div>
        <div class="form-field full-width">
          <label for="editState">状态</label>
          <select id="editState">
            <option value="ACTIVE">启用</option>
            <option value="DISABLED">禁用</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="secondary" id="cancelEdit">取消</button>
        <button id="saveEdit">保存</button>
      </div>
    </div>
  </div>

  <div id="platformLoginModal" class="modal-backdrop" hidden>
    <div class="modal login-modal" role="dialog" aria-modal="true" aria-labelledby="platformLoginTitle">
      <h2 id="platformLoginTitle">平台登录</h2>
      <div id="platformLoginBody"></div>
      <div id="platformLoginMessage" class="message"></div>
      <div class="modal-actions">
        <button class="secondary" id="cancelPlatformLogin">关闭</button>
        <button id="confirmPlatformLogin">提交</button>
      </div>
    </div>
  </div>

  <div id="actionModal" class="modal-backdrop" hidden>
    <div class="modal action-modal" role="dialog" aria-modal="true" aria-labelledby="actionTitle">
      <h2 id="actionTitle">操作</h2>
      <div id="actionBody"></div>
      <div id="actionMessage" class="message"></div>
      <div class="modal-actions">
        <button class="secondary" id="cancelAction">取消</button>
        <button id="confirmAction">保存</button>
      </div>
    </div>
  </div>

  <div id="toastStack" class="toast-stack" aria-live="polite"></div>

  <script>
    const state = {
      token: localStorage.getItem("dynamicBotAdminToken") || "",
      page: "overview",
      initialPage: "overview",
      qrSessions: {},
      edit: null,
      platformLoginModal: null,
      actionModal: null,
      cache: {
        overview: null,
        platformLogins: null,
        publishers: [],
        subscribers: [],
        subscriptions: [],
        filters: [],
        templates: null
      }
    };
    const els = id => document.getElementById(id);
    const esc = value => String(value ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    const labels = {
      ACTIVE: "启用",
      DISABLED: "禁用",
      SUCCESS: "成功",
      FAILED: "失败",
      PENDING: "等待中",
      CANCELED: "已取消",
      GROUP: "群",
      USER: "用户",
      CHANNEL: "频道",
      OTHER: "其他",
      ELEMENT: "元素",
      CONTENT: "内容",
      HAS_ELEMENT: "包含元素",
      KEYWORD: "关键词",
      REGEX: "正则表达式",
      EXPIRED: "已过期",
      UNSUPPORTED: "不支持",
      COOKIE: "Cookie",
      QR_CODE: "二维码",
      TEXT: "文本",
      IMAGE: "图片",
      VIDEO: "视频",
      CARD: "卡片",
      ORIGIN: "转发源动态",
      template: "模板",
      binding: "绑定"
    };
    const label = value => labels[value] || value;
    const pageMeta = {
      overview: ["概览", "运行状态与插件健康情况。"],
      login: ["平台登录", "动态源账号认证。"],
      subscriptions: ["订阅管理", "创建和管理发布者转发关系。"],
      entities: ["发布者与目标", "管理动态发布者和消息接收目标。"],
      filters: ["过滤规则", "管理每个订阅的动态屏蔽规则。"],
      templates: ["模板绑定", "查看模板并管理发布者绑定。"]
    };
    state.initialPage = pageFromLocation();

    function pageFromLocation() {
      const hashPage = location.hash.replace("#", "");
      if (pageMeta[hashPage]) return hashPage;
      const pathPage = location.pathname.split("/").filter(Boolean).pop() || "";
      return pageMeta[pathPage] ? pathPage : "overview";
    }

    function showInitialPage() {
      const page = pageFromLocation();
      if (!location.hash) {
        history.replaceState(null, "", "#" + page);
      }
      setPage(page);
    }

    function setMessage(target, text, isError) {
      const node = els(target);
      if (!node) return;
      node.textContent = text || "";
      node.classList.toggle("error", Boolean(isError));
    }

    function notify(text, isError) {
      if (!text) return;
      const stack = els("toastStack");
      if (!stack) return;
      const node = document.createElement("div");
      node.className = "toast" + (isError ? " error" : "");
      node.innerHTML = "<strong>" + (isError ? "操作失败" : "操作完成") + "</strong><span>" + esc(text) + "</span>";
      const remove = () => {
        if (node.parentNode) node.parentNode.removeChild(node);
      };
      node.addEventListener("click", remove);
      stack.appendChild(node);
      setTimeout(remove, isError ? 5200 : 3600);
    }

    function showLogin(text, isError) {
      els("appView").hidden = true;
      els("loginView").hidden = false;
      els("loginToken").value = state.token;
      setMessage("loginMessage", text || "", isError);
      setTimeout(() => els("loginToken").focus(), 0);
    }

    function showApp() {
      els("loginView").hidden = true;
      els("appView").hidden = false;
    }

    async function api(path, options) {
      const init = options || {};
      init.headers = Object.assign({}, init.headers || {}, { "Authorization": "Bearer " + state.token });
      if (init.body && !(init.body instanceof FormData)) init.headers["Content-Type"] = "application/json";
      const res = await fetch("/api" + path, init);
      if (!res.ok) {
        let detail = res.statusText;
        try { detail = (await res.json()).message || detail; } catch (_) {}
        throw new Error(detail);
      }
      return res.json();
    }

    async function apiBlob(path) {
      const resolvedPath = path.startsWith("/api/") ? path : "/api" + path;
      const res = await fetch(resolvedPath, { headers: { "Authorization": "Bearer " + state.token } });
      if (!res.ok) throw new Error(res.statusText);
      return res.blob();
    }

    async function verifyToken(token) {
      state.token = token.trim();
      if (!state.token) throw new Error("请输入管理 token");
      return api("/overview");
    }

    function badge(value) {
      const text = esc(label(value));
      const cls = value === "ACTIVE" || value === "SUCCESS" ? "ok" : value === "FAILED" || value === "DISABLED" ? "bad" : value === "PENDING" ? "warn" : "";
      return "<span class='pill " + cls + "'>" + text + "</span>";
    }

    function platformKey(platformId) {
      return String(platformId || "").replace(/[^A-Za-z0-9_-]/g, "_");
    }

    function optionHtml(value, text, selected) {
      return "<option value='" + esc(value) + "'" + (selected ? " selected" : "") + ">" + esc(text) + "</option>";
    }

    function subscriberLabel(subscriber) {
      if (!subscriber) return "未知目标";
      return "#" + subscriber.id + " · " + subscriber.platformId + " · " + label(subscriber.type) + " · " + subscriber.targetId + (subscriber.name ? " · " + subscriber.name : "");
    }

    function publisherLabel(publisher) {
      if (!publisher) return "未知发布者";
      return "#" + publisher.id + " · " + publisher.platformId + " · " + publisher.externalId + (publisher.name ? " · " + publisher.name : "");
    }

    function subscriptionLabel(subscription) {
      const subscriber = subscription.subscriber ? subscriberLabel(subscription.subscriber) : "目标 #" + subscription.subscriberId;
      const publisher = subscription.publisher ? publisherLabel(subscription.publisher) : "发布者 #" + subscription.publisherId;
      return "#" + subscription.id + " · " + subscriber + " -> " + publisher;
    }

    function uniqueValues(values) {
      return Array.from(new Set(values.filter(value => value !== null && value !== undefined && String(value).trim() !== "").map(value => String(value))));
    }

    function renderTable(id, columns, rows) {
      const colCount = columns.length;
      const head = "<tr>" + columns.map(c => "<th>" + esc(c.label) + "</th>").join("") + "</tr>";
      const body = rows.length
        ? rows.map(row => "<tr>" + columns.map(c => "<td>" + (c.render ? c.render(row) : esc(row[c.key])) + "</td>").join("") + "</tr>").join("")
        : "<tr><td colspan='" + colCount + "'><div class='empty'>暂无数据</div></td></tr>";
      els(id).innerHTML = head + body;
    }

    function setPage(page) {
      const nextPage = pageMeta[page] ? page : "overview";
      if (state.page !== nextPage) {
        closePlatformLoginModal();
        closeActionModal();
      }
      state.page = nextPage;
      const meta = pageMeta[nextPage] || pageMeta.overview;
      els("pageTitle").textContent = meta[0];
      els("pageSubtitle").textContent = meta[1];
      document.querySelectorAll("[data-page]").forEach(node => node.hidden = node.dataset.page !== nextPage);
      document.querySelectorAll("[data-nav]").forEach(node => node.classList.toggle("active", node.dataset.nav === nextPage));
      document.body.classList.remove("sidebar-open");
      loadPage(nextPage).catch(error => handleError(error));
    }

    function navigateTo(page) {
      const nextPage = pageMeta[page] ? page : "overview";
      const nextHash = "#" + nextPage;
      if (location.hash === nextHash) {
        setPage(nextPage);
      } else {
        location.hash = nextPage;
      }
    }

    async function loadPage(page, force) {
      if (page === "overview") return loadOverview(force);
      if (page === "login") return loadPlatformLogins(force);
      if (page === "subscriptions") return loadSubscriptions(force);
      if (page === "entities") return loadEntities(force);
      if (page === "filters") return loadFilters(force);
      if (page === "templates") return loadTemplates(force);
    }

    async function loadOverview(force) {
      if (force || !state.cache.overview) {
        state.cache.overview = await api("/overview");
      }
      const overview = state.cache.overview;
      els("stats").innerHTML = [
        ["命令数", overview.commandCount],
        ["订阅数", overview.subscriptionCount],
        ["待投递", overview.deliveryPending],
        ["失败", overview.deliveryFailed]
      ].map(item => "<div class='stat'><b>" + esc(item[1]) + "</b><span>" + esc(item[0]) + "</span></div>").join("");
      renderTable("plugins", [
        { label: "ID", key: "id" },
        { label: "名称", key: "name" },
        { label: "版本", key: "version" },
        { label: "状态", render: r => badge(r.state) },
        { label: "能力", render: r => esc(r.capabilities.join(", ")) },
        { label: "错误", key: "error" }
      ], overview.plugins);
      els("connectionState").innerHTML = "本机";
      refreshPlatformLoginNav(force).catch(error => handleError(error));
    }

    async function refreshPlatformLoginNav(force) {
      if (force || state.cache.platformLogins === null) {
        state.cache.platformLogins = await api("/platform-logins");
      }
      updatePlatformLoginNav(state.cache.platformLogins);
    }

    function updatePlatformLoginNav() {
    }

    async function loadPlatformLogins(force) {
      if (force || state.cache.platformLogins === null) {
        state.cache.platformLogins = await api("/platform-logins");
      }
      updatePlatformLoginNav(state.cache.platformLogins);
      renderPlatformLogins(state.cache.platformLogins);
      if (force) notify("已刷新平台登录状态", false);
    }

    function renderPlatformLogins(platforms) {
      const list = els("platformLoginList");
      if (!platforms || platforms.length === 0) {
        list.innerHTML = "<div class='empty'>未安装消息源插件</div>";
        return;
      }
      list.innerHTML = platforms.map(renderPlatformLoginCard).join("");
    }

    function renderPlatformLoginCard(platform) {
      const key = platformKey(platform.platformId);
      const methods = platform.supportedLoginMethods || [];
      const accountName = platform.account ? esc(platform.account.name || "未命名") : "未登录或未获取";
      const accountId = platform.account && platform.account.userId ? esc(platform.account.userId) : "暂无账号 ID";
      const methodLabels = methods.length ? methods.map(method => badge(method)).join("") : "<span class='pill warn'>不支持后台登录</span>";
      const cookieButton = methods.includes("COOKIE")
        ? "<button data-action='open-cookie-login' data-platform='" + esc(platform.platformId) + "' data-platform-key='" + key + "'>Cookie 登录</button>"
        : "";
      const qrButton = methods.includes("QR_CODE")
        ? "<button class='secondary' data-action='open-qr-login' data-platform='" + esc(platform.platformId) + "' data-platform-key='" + key + "'>扫码登录</button>"
        : "";
      const readonlyText = methods.length ? "" : "<span class='muted'>该平台插件不支持后台登录。</span>";
      return "<article class='platform-card' data-platform-card='" + key + "'>"
        + "<div class='platform-card-head'><div class='platform-title'>"
        + "<h3>" + esc(platform.pluginName || platform.platformId) + "</h3>"
        + "<div class='muted'>" + esc(platform.platformId) + " · " + esc(platform.pluginId) + " · v" + esc(platform.pluginVersion) + "</div>"
        + "<div class='platform-meta'>" + badge(platform.pluginState) + badge(platform.status) + methodLabels + "</div>"
        + "</div></div>"
        + "<div class='platform-account'><span class='muted'>当前账号</span><strong>" + accountName + "</strong><span class='muted'>" + accountId + "</span></div>"
        + "<div class='muted'>" + esc(localizeLoginMessage(platform.message)) + "</div>"
        + "<div id='platform-message-" + key + "' class='platform-message'></div>"
        + "<div class='platform-actions'>" + cookieButton + qrButton + "<button class='secondary' data-action='refresh-platform-login' data-platform='" + esc(platform.platformId) + "' data-platform-key='" + key + "'>刷新</button>" + readonlyText + "</div>"
        + "</article>";
    }

    function localizeLoginMessage(message) {
      const text = String(message || "");
      const lower = text.toLowerCase();
      if (lower.includes("login success") || lower.includes("logged in")) return "已登录";
      if (lower.includes("not logged in")) return "未登录";
      if (lower.includes("unsupported")) return "当前平台不支持该登录能力";
      if (lower.includes("waiting")) return "等待扫码确认";
      if (lower.includes("canceled")) return "已取消";
      if (lower.includes("expired")) return "二维码已过期";
      if (lower.includes("blank")) return "输入不能为空";
      return text;
    }

    function localizeActionMessage(message, fallback) {
      const text = String(message || "");
      const lower = text.toLowerCase();
      if (lower.includes("subscription removed")) return "订阅已删除";
      if (lower.includes("filter rule removed")) return "过滤规则已删除";
      if (lower.includes("filter rules removed")) {
        const match = text.match(/count=(\d+)/i);
        return match ? "过滤规则已清空：" + match[1] + " 条" : "过滤规则已清空";
      }
      if (lower.includes("template binding updated")) return "模板绑定已保存";
      if (lower.includes("template binding unchanged")) return "模板绑定未变化";
      if (lower.includes("template binding removed")) return "模板绑定已移除";
      if (lower.includes("template binding not found")) return "未找到模板绑定";
      return fallback || text;
    }

    async function ensurePlatformLogins(force) {
      if (force || state.cache.platformLogins === null) {
        state.cache.platformLogins = await api("/platform-logins");
      }
      return state.cache.platformLogins;
    }

    async function ensurePublishers(force) {
      if (force || state.cache.publishers.length === 0) {
        state.cache.publishers = await api("/publishers");
      }
      return state.cache.publishers;
    }

    async function ensureSubscribers(force) {
      if (force || state.cache.subscribers.length === 0) {
        state.cache.subscribers = await api("/subscribers");
      }
      return state.cache.subscribers;
    }

    async function ensureSubscriptions(force) {
      if (force || state.cache.subscriptions.length === 0) {
        state.cache.subscriptions = await api("/subscriptions");
      }
      return state.cache.subscriptions;
    }

    async function ensureTemplates(force) {
      if (force || !state.cache.templates) {
        state.cache.templates = await api("/templates");
      }
      return state.cache.templates;
    }

    async function loadEntities(force) {
      await Promise.all([ensurePublishers(force), ensureSubscribers(force)]);
      renderTable("publishers", [
        { label: "ID", key: "id" },
        { label: "平台", key: "platformId" },
        { label: "外部 ID", key: "externalId" },
        { label: "名称", key: "name" },
        { label: "状态", render: r => badge(r.state) },
        { label: "操作", render: r => "<div class='table-actions'><button class='secondary' data-action='edit-publisher' data-id='" + r.id + "'>编辑</button></div>" }
      ], state.cache.publishers);
      renderTable("subscribers", [
        { label: "ID", key: "id" },
        { label: "平台", key: "platformId" },
        { label: "类型", render: r => esc(label(r.type)) },
        { label: "目标", key: "targetId" },
        { label: "名称", key: "name" },
        { label: "状态", render: r => badge(r.state) },
        { label: "操作", render: r => "<div class='table-actions'><button class='secondary' data-action='edit-subscriber' data-id='" + r.id + "'>编辑</button></div>" }
      ], state.cache.subscribers);
    }

    async function loadSubscriptions(force) {
      await ensureSubscriptions(force);
      renderTable("subscriptions", [
        { label: "ID", key: "id" },
        { label: "目标", render: r => esc((r.subscriber && r.subscriber.platformId + ":" + label(r.subscriber.type) + ":" + r.subscriber.targetId) || r.subscriberId) },
        { label: "发布者", render: r => esc((r.publisher && r.publisher.platformId + ":" + r.publisher.externalId + " " + r.publisher.name) || r.publisherId) },
        { label: "创建时间", render: r => esc(formatTime(r.createdAtEpochSeconds)) },
        { label: "操作", render: r => "<div class='table-actions'><button class='danger' data-action='delete-subscription' data-id='" + r.id + "'>删除</button></div>" }
      ], state.cache.subscriptions);
    }

    async function loadFilters(force) {
      await ensureSubscriptions(force);
      updateFilterScopeOptions();
      const id = els("filterScopeSubscriptionId").value.trim();
      state.cache.filters = await api("/filter-rules" + (id ? "?subscriptionId=" + encodeURIComponent(id) : ""));
      renderTable("filters", [
        { label: "ID", key: "id" },
        { label: "订阅", key: "subscriptionId" },
        { label: "类型", render: r => esc(label(r.ruleType)) },
        { label: "匹配方式", render: r => esc(label(r.matcher)) },
        { label: "值", key: "value" },
        { label: "启用", render: r => badge(r.enabled ? "ACTIVE" : "DISABLED") },
        { label: "操作", render: r => "<div class='table-actions'><button class='danger' data-action='delete-filter' data-id='" + r.id + "'>删除</button></div>" }
      ], state.cache.filters);
    }

    function updateFilterScopeOptions(selectedValue) {
      const select = els("filterScopeSubscriptionId");
      if (!select) return;
      const current = selectedValue !== undefined ? selectedValue : select.value;
      select.innerHTML = optionHtml("", "全部订阅", current === "") + state.cache.subscriptions
        .map(subscription => optionHtml(subscription.id, subscriptionLabel(subscription), String(subscription.id) === String(current)))
        .join("");
      els("clearFilters").disabled = !select.value;
    }

    async function loadTemplates(force) {
      const data = await ensureTemplates(force);
      await ensurePublishers(force);
      const publishersById = Object.fromEntries(state.cache.publishers.map(publisher => [String(publisher.id), publisher]));
      const rows = data.templates.map(t => ({ kind: "template", id: "", name: t.name, value: t.body }))
        .concat(data.bindings.map(b => ({
          kind: "binding",
          id: b.id,
          publisherId: b.publisherId,
          name: b.publisherId ? publisherLabel(publishersById[String(b.publisherId)]) : (b.platformId || ""),
          value: b.templateName
        })));
      renderTable("templates", [
        { label: "类型", render: r => esc(label(r.kind)) },
        { label: "ID", key: "id" },
        { label: "名称", key: "name" },
        { label: "内容", key: "value" },
        { label: "操作", render: r => r.kind === "binding" && r.publisherId
          ? "<div class='table-actions'><button class='danger' data-action='delete-template-binding' data-publisher-id='" + esc(r.publisherId) + "'>移除</button></div>"
          : "<span class='muted'>-</span>" }
      ], rows);
    }

    function invalidate(...keys) {
      keys.forEach(key => {
        if (Array.isArray(state.cache[key])) state.cache[key] = [];
        else state.cache[key] = null;
      });
    }

    function formatTime(epochSeconds) {
      if (!epochSeconds) return "";
      return new Date(epochSeconds * 1000).toLocaleString();
    }

    function handleError(error) {
      if (String(error.message).toLowerCase().includes("unauthorized")) {
        localStorage.removeItem("dynamicBotAdminToken");
        showLogin("Token 无效或已过期", true);
      } else {
        notify(error.message, true);
      }
    }

    function setPlatformMessage(platformId, text, isError) {
      const node = els("platform-message-" + platformKey(platformId));
      if (node) {
        node.textContent = "";
        node.classList.toggle("error", false);
      }
      if (text) notify(platformId + "：" + text, isError);
    }

    function setLoginModalMessage(text, isError) {
      setMessage("platformLoginMessage", text || "", isError);
    }

    function handlePlatformError(platformId, error) {
      if (String(error.message).toLowerCase().includes("unauthorized")) {
        handleError(error);
        return;
      }
      setPlatformMessage(platformId, error.message, true);
      if (state.platformLoginModal && state.platformLoginModal.platformId === platformId) {
        setLoginModalMessage(error.message, true);
      }
    }

    function clearQrSession(platformId, cancelRemote) {
      const current = state.qrSessions[platformId];
      if (!current) return;
      if (current.timer) clearInterval(current.timer);
      if (current.url) URL.revokeObjectURL(current.url);
      delete state.qrSessions[platformId];
      if (cancelRemote && current.loginId) {
        api("/login/qr/" + encodeURIComponent(current.loginId), { method: "DELETE" })
          .catch(error => handlePlatformError(platformId, error));
      }
    }

    function clearAllQrSessions(cancelRemote) {
      Object.keys(state.qrSessions).forEach(platformId => clearQrSession(platformId, cancelRemote));
    }

    function setPlatformBusy(platformId, busy) {
      const key = platformKey(platformId);
      document.querySelectorAll("[data-platform-key='" + key + "']").forEach(node => {
        if (node.tagName === "BUTTON") node.disabled = busy;
      });
      if (state.platformLoginModal && state.platformLoginModal.platformId === platformId) {
        els("confirmPlatformLogin").disabled = busy;
      }
    }

    async function refreshPlatformLogin(platformId) {
      state.cache.platformLogins = await api("/platform-logins");
      updatePlatformLoginNav(state.cache.platformLogins);
      renderPlatformLogins(state.cache.platformLogins);
      if (platformId) setPlatformMessage(platformId, "已刷新登录状态", false);
    }

    function findPlatformLogin(platformId) {
      return (state.cache.platformLogins || []).find(item => item.platformId === platformId);
    }

    function platformDisplayName(platformId) {
      const platform = findPlatformLogin(platformId);
      return platform ? (platform.pluginName || platform.platformId) : platformId;
    }

    function openPlatformLoginModal(platformId, mode) {
      clearQrSession(platformId, true);
      state.platformLoginModal = { platformId, mode };
      const key = platformKey(platformId);
      const title = platformDisplayName(platformId) + (mode === "cookie" ? " Cookie 登录" : " 二维码登录");
      els("platformLoginTitle").textContent = title;
      els("platformLoginModal").hidden = false;
      setLoginModalMessage("", false);
      els("confirmPlatformLogin").hidden = mode !== "cookie";
      els("confirmPlatformLogin").disabled = false;
      if (mode === "cookie") {
        els("platformLoginBody").innerHTML = "<div class='form-field full-width'><label for='platformCookieInput'>Cookie</label><textarea id='platformCookieInput' placeholder='SESSDATA=...'></textarea></div>";
        setTimeout(() => els("platformCookieInput").focus(), 0);
      } else {
        els("platformLoginBody").innerHTML = "<div id='qr-" + key + "' class='qr-box'><span class='muted'>正在生成二维码...</span></div>";
        startQrLogin(platformId).catch(error => handlePlatformError(platformId, error));
      }
    }

    function closePlatformLoginModal() {
      if (state.platformLoginModal && state.platformLoginModal.mode === "qr") {
        clearQrSession(state.platformLoginModal.platformId, true);
      }
      state.platformLoginModal = null;
      els("platformLoginModal").hidden = true;
      els("platformLoginBody").innerHTML = "";
      setLoginModalMessage("", false);
      els("confirmPlatformLogin").hidden = false;
      els("confirmPlatformLogin").disabled = false;
    }

    async function submitCookieLogin() {
      const modal = state.platformLoginModal;
      if (!modal || modal.mode !== "cookie") return;
      const platformId = modal.platformId;
      const input = els("platformCookieInput");
      if (!input || !input.value.trim()) {
        setLoginModalMessage("请输入 Cookie", true);
        return;
      }
      setPlatformBusy(platformId, true);
      try {
        const result = await api("/platforms/" + encodeURIComponent(platformId) + "/login/cookie", {
          method: "POST",
          body: JSON.stringify({ cookie: input.value })
        });
        input.value = "";
        await refreshPlatformLogin(platformId);
        const text = "Cookie 登录：" + label(result.status) + " " + localizeLoginMessage(result.message);
        const failed = result.status === "FAILED" || result.status === "EXPIRED" || result.status === "UNSUPPORTED";
        setPlatformMessage(platformId, text, failed);
        if (result.status === "SUCCESS") {
          closePlatformLoginModal();
        } else {
          setLoginModalMessage(text, failed);
        }
      } catch (error) {
        handlePlatformError(platformId, error);
      } finally {
        setPlatformBusy(platformId, false);
      }
    }

    async function startQrLogin(platformId) {
      const key = platformKey(platformId);
      clearQrSession(platformId, true);
      setPlatformBusy(platformId, true);
      try {
        const started = await api("/platforms/" + encodeURIComponent(platformId) + "/login/qr", { method: "POST" });
        const blob = await apiBlob(started.imageUrl);
        const url = URL.createObjectURL(blob);
        if (!state.platformLoginModal || state.platformLoginModal.platformId !== platformId || state.platformLoginModal.mode !== "qr") {
          URL.revokeObjectURL(url);
          return;
        }
        const qr = els("qr-" + key);
        if (qr) {
          qr.innerHTML = "<img alt='二维码' src='" + url + "'><span id='qrStatus-" + key + "'>" + esc(localizeLoginMessage(started.message || "等待扫码")) + "</span>";
        }
        state.qrSessions[platformId] = { timer: null, url: url, loginId: started.loginId };
        state.qrSessions[platformId].timer = setInterval(async () => {
          try {
            const status = await api("/login/qr/" + started.loginId);
            const statusNode = els("qrStatus-" + key);
            if (statusNode) statusNode.textContent = label(status.status) + " " + localizeLoginMessage(status.message);
            if (status.status !== "PENDING") {
              clearQrSession(platformId);
              await refreshPlatformLogin(platformId);
              const text = "二维码登录：" + label(status.status) + " " + localizeLoginMessage(status.message);
              const failed = status.status === "FAILED" || status.status === "EXPIRED";
              setPlatformMessage(platformId, text, failed);
              if (state.platformLoginModal && state.platformLoginModal.platformId === platformId) {
                setLoginModalMessage(text, failed);
              }
            }
          } catch (error) {
            clearQrSession(platformId);
            handlePlatformError(platformId, error);
          }
        }, 1500);
      } catch (error) {
        clearQrSession(platformId);
        handlePlatformError(platformId, error);
      } finally {
        setPlatformBusy(platformId, false);
      }
    }

    function openEdit(type, row) {
      state.edit = { type, id: row.id };
      els("editTitle").textContent = type === "publisher" ? "编辑发布者" : "编辑消息目标";
      els("editName").value = row.name || "";
      els("editState").value = row.state || "ACTIVE";
      els("editModal").hidden = false;
      setTimeout(() => els("editName").focus(), 0);
    }

    function closeEdit() {
      state.edit = null;
      els("editModal").hidden = true;
    }

    async function saveEdit() {
      if (!state.edit) return;
      const path = state.edit.type === "publisher" ? "/publishers/" : "/subscribers/";
      await api(path + state.edit.id, {
        method: "PATCH",
        body: JSON.stringify({ name: els("editName").value, state: els("editState").value })
      });
      closeEdit();
      invalidate("publishers", "subscribers", "subscriptions");
      await loadEntities(true);
      notify("已保存", false);
    }

    function setActionMessage(text, isError) {
      setMessage("actionMessage", text || "", isError);
    }

    async function openActionModal(kind) {
      closePlatformLoginModal();
      state.actionModal = { kind };
      const titles = {
        subscription: "创建订阅",
        filter: "添加过滤规则",
        template: "绑定发布者模板"
      };
      const confirmTexts = {
        subscription: "创建",
        filter: "添加",
        template: "绑定"
      };
      els("actionTitle").textContent = titles[kind] || "操作";
      els("confirmAction").textContent = confirmTexts[kind] || "保存";
      els("confirmAction").disabled = true;
      els("actionBody").innerHTML = "<div class='empty'>正在加载可选项...</div>";
      setActionMessage("", false);
      els("actionModal").hidden = false;
      try {
        let canSubmit = true;
        if (kind === "subscription") canSubmit = await renderSubscriptionAction();
        if (kind === "filter") canSubmit = await renderFilterAction();
        if (kind === "template") canSubmit = await renderTemplateAction();
        els("confirmAction").disabled = canSubmit === false;
      } catch (error) {
        setActionMessage(error.message, true);
      }
    }

    function closeActionModal() {
      state.actionModal = null;
      if (!els("actionModal")) return;
      els("actionModal").hidden = true;
      els("actionBody").innerHTML = "";
      setActionMessage("", false);
      els("confirmAction").disabled = false;
    }

    async function renderSubscriptionAction() {
      await Promise.all([ensureSubscribers(), ensurePublishers(), ensurePlatformLogins()]);
      const subscribers = state.cache.subscribers;
      const selectedSubscriber = subscribers[0] ? String(subscribers[0].id) : "new";
      const subscriberOptions = optionHtml("new", "新建消息目标", selectedSubscriber === "new")
        + subscribers.map(subscriber => optionHtml(subscriber.id, subscriberLabel(subscriber), String(subscriber.id) === selectedSubscriber)).join("");
      const targetPlatforms = uniqueValues(subscribers.map(item => item.platformId).concat(["onebot"]));
      const targetPlatformOptions = targetPlatforms.map((platform, index) => optionHtml(platform, platform, index === 0)).join("");
      const publisherPlatforms = uniqueValues((state.cache.platformLogins || []).map(item => item.platformId).concat(state.cache.publishers.map(item => item.platformId)));
      const publisherPlatformControl = publisherPlatforms.length
        ? "<select id='actionPublisherPlatform'>" + publisherPlatforms.map((platform, index) => optionHtml(platform, platform, index === 0)).join("") + "</select>"
        : "<input id='actionPublisherPlatform' placeholder='未检测到消息源平台'>";
      els("actionBody").innerHTML = "<div class='forms'>"
        + "<div class='form-field full-width'><label for='actionSubscriberSelect'>消息目标</label><select id='actionSubscriberSelect'>" + subscriberOptions + "</select><span class='field-hint'>选择已有目标会自动使用平台、类型和目标 ID。</span></div>"
        + "<div id='actionSubscriberFields' class='forms full-width'>"
        + "<div class='form-field'><label for='actionSubscriberPlatform'>目标平台</label><select id='actionSubscriberPlatform'>" + targetPlatformOptions + "</select></div>"
        + "<div class='form-field'><label for='actionSubscriberType'>目标类型</label><select id='actionSubscriberType'>"
        + optionHtml("GROUP", "群", true) + optionHtml("USER", "用户", false) + optionHtml("CHANNEL", "频道", false) + optionHtml("OTHER", "其他", false)
        + "</select></div>"
        + "<div class='form-field'><label for='actionSubscriberTargetId'>目标 ID</label><input id='actionSubscriberTargetId' placeholder='群、用户或频道 ID'></div>"
        + "<div class='form-field'><label for='actionSubscriberName'>目标名称</label><input id='actionSubscriberName' placeholder='可选显示名'></div>"
        + "</div>"
        + "<div class='form-field'><label for='actionPublisherPlatform'>发布者平台</label>" + publisherPlatformControl + "</div>"
        + "<div class='form-field'><label for='actionPublisherExternalId'>发布者外部 ID</label><input id='actionPublisherExternalId' placeholder='例如 Bilibili UID'></div>"
        + "</div>";
      els("actionSubscriberSelect").onchange = updateSubscriptionTargetFields;
      updateSubscriptionTargetFields();
      return true;
    }

    function updateSubscriptionTargetFields() {
      const select = els("actionSubscriberSelect");
      const fields = els("actionSubscriberFields");
      if (!select || !fields) return;
      fields.hidden = select.value !== "new";
    }

    async function renderFilterAction() {
      await ensureSubscriptions();
      if (state.cache.subscriptions.length === 0) {
        els("actionBody").innerHTML = "<div class='empty'>暂无订阅，请先创建订阅关系。</div>";
        return false;
      }
      const subscriptionOptions = state.cache.subscriptions
        .map((subscription, index) => optionHtml(subscription.id, subscriptionLabel(subscription), index === 0))
        .join("");
      els("actionBody").innerHTML = "<div class='forms'>"
        + "<div class='form-field full-width'><label for='actionFilterSubscriptionId'>订阅</label><select id='actionFilterSubscriptionId'>" + subscriptionOptions + "</select></div>"
        + "<div class='form-field'><label for='actionFilterRuleType'>规则类型</label><select id='actionFilterRuleType'>"
        + optionHtml("ELEMENT", "元素", true) + optionHtml("CONTENT", "内容", false)
        + "</select></div>"
        + "<div class='form-field' id='actionFilterMatcherWrap'><label for='actionFilterMatcher'>匹配方式</label><select id='actionFilterMatcher'>"
        + optionHtml("KEYWORD", "关键词", true) + optionHtml("REGEX", "正则表达式", false)
        + "</select></div>"
        + "<div class='form-field' id='actionFilterElementWrap'><label for='actionFilterElement'>元素</label><select id='actionFilterElement'>"
        + ["TEXT", "IMAGE", "VIDEO", "CARD", "ORIGIN"].map((item, index) => optionHtml(item, label(item), index === 1)).join("")
        + "</select></div>"
        + "<div class='form-field full-width' id='actionFilterValueWrap'><label for='actionFilterValue'>匹配内容</label><input id='actionFilterValue' placeholder='关键词或正则表达式'></div>"
        + "</div>";
      els("actionFilterRuleType").onchange = updateFilterActionFields;
      updateFilterActionFields();
      return true;
    }

    function updateFilterActionFields() {
      const isElement = els("actionFilterRuleType") && els("actionFilterRuleType").value === "ELEMENT";
      if (els("actionFilterMatcherWrap")) els("actionFilterMatcherWrap").hidden = isElement;
      if (els("actionFilterValueWrap")) els("actionFilterValueWrap").hidden = isElement;
      if (els("actionFilterElementWrap")) els("actionFilterElementWrap").hidden = !isElement;
    }

    async function renderTemplateAction() {
      await Promise.all([ensureTemplates(), ensurePublishers()]);
      const templates = state.cache.templates.templates || [];
      const publishers = state.cache.publishers;
      if (templates.length === 0) {
        els("actionBody").innerHTML = "<div class='empty'>main.yml 中还没有可绑定模板。</div>";
        return false;
      }
      if (publishers.length === 0) {
        els("actionBody").innerHTML = "<div class='empty'>暂无发布者，请先创建订阅或同步发布者。</div>";
        return false;
      }
      els("actionBody").innerHTML = "<div class='forms'>"
        + "<div class='form-field full-width'><label for='actionTemplatePublisherId'>发布者</label><select id='actionTemplatePublisherId'>"
        + publishers.map((publisher, index) => optionHtml(publisher.id, publisherLabel(publisher), index === 0)).join("")
        + "</select></div>"
        + "<div class='form-field full-width'><label for='actionTemplateName'>模板</label><select id='actionTemplateName'>"
        + templates.map((template, index) => optionHtml(template.name, template.name, index === 0)).join("")
        + "</select></div>"
        + "</div>";
      return true;
    }

    async function submitActionModal() {
      if (!state.actionModal) return;
      els("confirmAction").disabled = true;
      try {
        if (state.actionModal.kind === "subscription") {
          await submitSubscriptionAction();
        } else if (state.actionModal.kind === "filter") {
          await submitFilterAction();
        } else if (state.actionModal.kind === "template") {
          await submitTemplateAction();
        }
      } finally {
        if (state.actionModal) els("confirmAction").disabled = false;
      }
    }

    async function submitSubscriptionAction() {
      const selectedValue = els("actionSubscriberSelect").value;
      const selectedSubscriber = state.cache.subscribers.find(item => String(item.id) === selectedValue);
      const payload = selectedSubscriber ? {
        subscriberPlatform: selectedSubscriber.platformId,
        subscriberType: selectedSubscriber.type,
        subscriberTargetId: selectedSubscriber.targetId,
        subscriberName: selectedSubscriber.name
      } : {
        subscriberPlatform: els("actionSubscriberPlatform").value,
        subscriberType: els("actionSubscriberType").value,
        subscriberTargetId: els("actionSubscriberTargetId").value,
        subscriberName: els("actionSubscriberName").value
      };
      payload.publisherPlatform = els("actionPublisherPlatform").value;
      payload.publisherExternalId = els("actionPublisherExternalId").value;
      payload.autoFollow = true;
      if (!payload.publisherPlatform.trim()) return setActionMessage("请选择发布者平台", true);
      if (!payload.publisherExternalId.trim()) return setActionMessage("请填写发布者外部 ID", true);
      if (!selectedSubscriber && !payload.subscriberTargetId.trim()) return setActionMessage("请填写目标 ID", true);
      await api("/subscriptions", { method: "POST", body: JSON.stringify(payload) });
      closeActionModal();
      invalidate("overview", "publishers", "subscribers", "subscriptions", "filters", "templates");
      await loadSubscriptions(true);
      notify("订阅已创建", false);
    }

    async function submitFilterAction() {
      const ruleType = els("actionFilterRuleType").value;
      const payload = {
        subscriptionId: Number(els("actionFilterSubscriptionId").value),
        ruleType: ruleType,
        matcher: ruleType === "ELEMENT" ? "HAS_ELEMENT" : els("actionFilterMatcher").value,
        value: ruleType === "ELEMENT" ? els("actionFilterElement").value : els("actionFilterValue").value
      };
      if (!payload.subscriptionId) return setActionMessage("请选择订阅", true);
      if (!payload.value.trim()) return setActionMessage("请填写匹配内容", true);
      await api("/filter-rules", { method: "POST", body: JSON.stringify(payload) });
      closeActionModal();
      await loadFilters(true);
      notify("过滤规则已添加", false);
    }

    async function submitTemplateAction() {
      const publisherId = els("actionTemplatePublisherId").value;
      const templateName = els("actionTemplateName").value;
      if (!publisherId) return setActionMessage("请选择发布者", true);
      if (!templateName) return setActionMessage("请选择模板", true);
      const result = await api("/template-bindings/publisher/" + encodeURIComponent(publisherId), {
        method: "PUT",
        body: JSON.stringify({ templateName: templateName })
      });
      closeActionModal();
      invalidate("templates");
      await loadTemplates(true);
      notify(localizeActionMessage(result.message, "模板绑定已保存"), false);
    }

    document.querySelectorAll("[data-nav]").forEach(button => {
      button.addEventListener("click", () => navigateTo(button.dataset.nav));
    });

    window.addEventListener("hashchange", () => setPage(pageFromLocation()));

    document.addEventListener("click", async event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.dataset.action;
      const id = Number(button.dataset.id);
      const platform = button.dataset.platform;
      const publisherId = Number(button.dataset.publisherId);
      try {
        if (action === "open-cookie-login") {
          openPlatformLoginModal(platform, "cookie");
        } else if (action === "open-qr-login") {
          openPlatformLoginModal(platform, "qr");
        } else if (action === "refresh-platform-login") {
          setPlatformBusy(platform, true);
          try {
            await refreshPlatformLogin(platform);
          } finally {
            setPlatformBusy(platform, false);
          }
        } else if (action === "delete-subscription") {
          if (!confirm("确定删除这个订阅关系吗？")) return;
          const result = await api("/subscriptions/" + id, { method: "DELETE" });
          invalidate("overview", "subscriptions", "filters");
          await loadSubscriptions(true);
          notify(localizeActionMessage(result.message, "订阅已删除"), false);
        } else if (action === "delete-filter") {
          if (!confirm("确定删除这条过滤规则吗？")) return;
          const result = await api("/filter-rules/" + id, { method: "DELETE" });
          await loadFilters(true);
          notify(localizeActionMessage(result.message, "过滤规则已删除"), false);
        } else if (action === "delete-template-binding") {
          if (!confirm("确定移除这个模板绑定吗？")) return;
          const result = await api("/template-bindings/publisher/" + encodeURIComponent(publisherId), { method: "DELETE" });
          invalidate("templates");
          await loadTemplates(true);
          notify(localizeActionMessage(result.message, "模板绑定已移除"), false);
        } else if (action === "edit-publisher") {
          openEdit("publisher", state.cache.publishers.find(row => row.id === id));
        } else if (action === "edit-subscriber") {
          openEdit("subscriber", state.cache.subscribers.find(row => row.id === id));
        }
      } catch (error) {
        handleError(error);
      }
    });

    els("loginForm").onsubmit = async event => {
      event.preventDefault();
      els("loginButton").disabled = true;
      try {
        const overview = await verifyToken(els("loginToken").value);
        localStorage.setItem("dynamicBotAdminToken", state.token);
        state.cache.overview = overview;
        showApp();
        refreshPlatformLoginNav(true).catch(handleError);
        showInitialPage();
      } catch (error) {
        showLogin(error.message, true);
      } finally {
        els("loginButton").disabled = false;
      }
    };

    els("logout").onclick = () => {
      closePlatformLoginModal();
      closeActionModal();
      clearAllQrSessions(true);
      state.token = "";
      localStorage.removeItem("dynamicBotAdminToken");
      showLogin("", false);
    };
    els("refresh").onclick = async () => {
      try {
        invalidate("overview", "platformLogins", "publishers", "subscribers", "subscriptions", "filters", "templates");
        await loadPage(state.page, true);
        notify("已刷新当前页面", false);
      } catch (error) {
        handleError(error);
      }
    };
    els("refreshPlatformLogins").onclick = () => loadPlatformLogins(true).catch(handleError);
    els("mobileMenu").onclick = () => document.body.classList.toggle("sidebar-open");
    els("cancelEdit").onclick = closeEdit;
    els("saveEdit").onclick = () => saveEdit().catch(handleError);
    els("editModal").addEventListener("click", event => {
      if (event.target === els("editModal")) closeEdit();
    });
    els("cancelPlatformLogin").onclick = closePlatformLoginModal;
    els("confirmPlatformLogin").onclick = () => submitCookieLogin().catch(handleError);
    els("platformLoginModal").addEventListener("click", event => {
      if (event.target === els("platformLoginModal")) closePlatformLoginModal();
    });

    els("cancelAction").onclick = closeActionModal;
    els("confirmAction").onclick = () => submitActionModal().catch(error => {
      setActionMessage(error.message, true);
      notify(error.message, true);
    });
    els("actionModal").addEventListener("click", event => {
      if (event.target === els("actionModal")) closeActionModal();
    });
    els("openCreateSubscription").onclick = () => openActionModal("subscription").catch(handleError);
    els("openAddFilter").onclick = () => openActionModal("filter").catch(handleError);
    els("openTemplateBinding").onclick = () => openActionModal("template").catch(handleError);

    els("loadFilters").onclick = () => loadFilters(true).catch(handleError);
    els("filterScopeSubscriptionId").onchange = () => loadFilters().catch(handleError);
    els("clearFilters").onclick = async () => {
      const id = els("filterScopeSubscriptionId").value.trim();
      if (!id) return notify("请先选择一个订阅", true);
      if (!confirm("确定清空订阅 #" + id + " 的所有过滤规则吗？")) return;
      try {
        const result = await api("/subscriptions/" + encodeURIComponent(id) + "/filter-rules", { method: "DELETE" });
        await loadFilters(true);
        notify(localizeActionMessage(result.message, "过滤规则已清空"), false);
      } catch (error) { handleError(error); }
    };

    if (state.token) {
      verifyToken(state.token).then(overview => {
        state.cache.overview = overview;
        showApp();
        refreshPlatformLoginNav(true).catch(handleError);
        showInitialPage();
      }).catch(() => showLogin("已保存的 token 无效", true));
    } else {
      showLogin("", false);
    }
  </script>
</body>
</html>
