<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>动态转发运维台</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-soft: #f9fbfc;
      --text: #18212d;
      --muted: #667085;
      --line: #d9e1e8;
      --line-strong: #b8c4cf;
      --accent: #0f766e;
      --accent-soft: #e6f4f1;
      --blue: #2563eb;
      --amber: #b45309;
      --red: #b42318;
      --green: #147d4f;
      --shadow: 0 16px 44px rgba(24, 33, 45, 0.12);
      --focus: #9edbd4;
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 21px; line-height: 1.18; }
    h2 { font-size: 16px; line-height: 1.25; }
    h3 { font-size: 14px; line-height: 1.25; }
    button, input, select, textarea { font: inherit; }
    button {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 7px 11px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { filter: brightness(0.96); }
    button:disabled { cursor: progress; opacity: 0.62; }
    button.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line-strong);
    }
    button.ghost {
      background: transparent;
      color: var(--text);
      border-color: transparent;
    }
    button.danger { background: var(--red); color: #fff; }
    input, select, textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      background: #fff;
    }
    textarea { min-height: 96px; resize: vertical; }
    input:focus, select:focus, textarea:focus, button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 1px;
    }
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-panel {
      width: min(420px, 100%);
      display: grid;
      gap: 14px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 900;
    }
    .login-form { display: grid; gap: 10px; }
    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 246px minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      z-index: 5;
    }
    .brand {
      display: grid;
      gap: 9px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand strong { font-size: 16px; }
    .brand span { color: var(--muted); font-size: 12px; }
    .nav {
      display: grid;
      gap: 4px;
      padding: 12px 10px;
    }
    .nav button {
      display: flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 10px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      text-align: left;
      justify-content: flex-start;
    }
    .nav button.active {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 8px;
      padding: 12px 10px 16px;
      border-top: 1px solid var(--line);
    }
    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(244, 246, 248, 0.92);
      backdrop-filter: blur(10px);
    }
    .topbar-title {
      display: grid;
      gap: 2px;
      min-width: 0;
    }
    .topbar-title span {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .menu-button { display: none; }
    main {
      min-width: 0;
      padding: 18px;
    }
    .page {
      display: grid;
      gap: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
    }
    .panel {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 26px rgba(24, 33, 45, 0.045);
    }
    .panel.full { grid-column: span 12; }
    .panel.half { grid-column: span 6; }
    .panel.third { grid-column: span 4; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .panel-head p { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
    }
    .stat {
      min-width: 0;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .stat b {
      display: block;
      font-size: 25px;
      line-height: 1.05;
      margin-bottom: 4px;
    }
    .stat span { color: var(--muted); font-size: 12px; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }
    .field.full { grid-column: 1 / -1; }
    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .checks {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .check {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      font-weight: 650;
    }
    .check input {
      width: 16px;
      height: 16px;
      min-height: 0;
      padding: 0;
    }
    .rule-matrix {
      display: grid;
      gap: 8px;
    }
    .rule-row {
      display: grid;
      grid-template-columns: minmax(96px, 1fr) auto auto;
      align-items: center;
      gap: 12px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }
    .rule-row .check {
      min-height: 24px;
    }
    .inline-note {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    tr:last-child td { border-bottom: 0; }
    .primary-line {
      display: block;
      max-width: 340px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .sub-line {
      display: block;
      max-width: 380px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #edf1f5;
      color: #405064;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .pill.ok { background: #e7f7ef; color: var(--green); }
    .pill.bad { background: #fdeceb; color: var(--red); }
    .pill.warn { background: #fff3df; color: var(--amber); }
    .pill.info { background: #eaf1ff; color: var(--blue); }
    .tag-list {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .avatar {
      width: 34px;
      height: 34px;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .header-image {
      width: 72px;
      height: 34px;
      display: block;
      border-radius: 7px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .media-placeholder {
      display: block;
      background: var(--panel-soft);
    }
    .identity-cell {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .card {
      display: grid;
      gap: 10px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .log-row {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }
    .message {
      min-height: 20px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .message.error { color: var(--red); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(24, 33, 45, 0.38);
    }
    .modal {
      width: min(760px, 100%);
      max-height: min(86vh, 900px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .modal.small { width: min(460px, 100%); }
    .modal.wide { width: min(980px, 100%); }
    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .modal-body {
      min-width: 0;
      overflow: auto;
      padding: 16px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .toast-stack {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 40;
      width: min(360px, calc(100vw - 32px));
      display: grid;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 11px 12px;
      border: 1px solid #b7d9d4;
      border-radius: 8px;
      background: rgba(255,255,255,0.96);
      box-shadow: var(--shadow);
      pointer-events: auto;
      cursor: pointer;
    }
    .toast.error { border-color: #f1b8b2; }
    .toast strong { display: block; color: var(--accent); font-size: 13px; }
    .toast.error strong { color: var(--red); }
    .toast span { color: var(--muted); overflow-wrap: anywhere; }
    @media (max-width: 1180px) {
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .panel.half, .panel.third { grid-column: span 12; }
    }
    @media (max-width: 880px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        width: min(286px, calc(100vw - 34px));
        transform: translateX(-105%);
        transition: transform 0.18s ease;
        box-shadow: var(--shadow);
      }
      body.sidebar-open .sidebar { transform: translateX(0); }
      .menu-button { display: inline-flex; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions { width: 100%; }
      main { padding: 14px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form-grid { grid-template-columns: 1fr; }
      table { min-width: 720px; }
    }
  </style>
</head>
<body>
  <section id="loginView" class="login-shell">
    <div class="login-panel">
      <div class="brand-mark">动</div>
      <div>
        <h1>动态转发运维台</h1>
        <p class="sub-line">本地管理入口</p>
      </div>
      <form id="loginForm" class="login-form">
        <input id="loginToken" type="password" placeholder="管理 Token" autocomplete="current-password" autofocus>
        <button id="loginButton" type="submit">登录</button>
        <div id="loginMessage" class="message"></div>
      </form>
    </div>
  </section>

  <section id="appView" class="app-shell" hidden>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">动</div>
        <strong>动态转发运维台</strong>
        <span>本地控制台</span>
      </div>
      <nav class="nav" aria-label="运维台导航">
        <button data-nav="dashboard" class="active">仪表盘</button>
        <button data-nav="plugins">插件管理</button>
        <button data-nav="login">平台登录</button>
        <button data-nav="subscriptions">订阅管理</button>
        <button data-nav="entities">发布者与目标</button>
        <button data-nav="logs">日志查看</button>
        <button data-nav="configs">配置</button>
        <button data-nav="system">系统设置</button>
      </nav>
      <div class="sidebar-footer">
        <button class="secondary" id="refreshPage">刷新</button>
        <button class="secondary" id="logout">退出登录</button>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <button class="secondary menu-button" id="mobileMenu">菜单</button>
        <div class="topbar-title">
          <h1 id="pageTitle">仪表盘</h1>
          <span id="pageSubtitle">运行状态</span>
        </div>
        <div class="top-actions">
          <span class="pill info" id="connectionState">本地</span>
          <button class="danger" id="stopApplication">停止主项目</button>
        </div>
      </header>
      <main id="content"></main>
    </div>
  </section>

  <div id="modalBackdrop" class="modal-backdrop" hidden>
    <div id="modalBox" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button class="ghost" id="modalClose" title="关闭">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-actions">
        <span id="modalMessage" class="message"></span>
        <button class="secondary" id="modalCancel">取消</button>
        <button id="modalConfirm">保存</button>
      </div>
    </div>
  </div>
  <div id="toastStack" class="toast-stack"></div>

  <script>
    const $ = id => document.getElementById(id);
    const tokenKey = "dynamicBotAdminToken";
    const pages = {
      dashboard: ["仪表盘", "运行状态"],
      plugins: ["插件管理", "生命周期与能力"],
      login: ["平台登录", "动态源账号状态"],
      subscriptions: ["订阅管理", "订阅策略与过滤规则"],
      entities: ["发布者与目标", "来源与消息出口"],
      logs: ["日志查看", "进程内实时日志"],
      configs: ["配置", "主项目与插件配置"],
      system: ["系统设置", "运行信息与操作"]
    };
    const state = {
      token: localStorage.getItem(tokenKey) || "",
      page: "dashboard",
      cache: {},
      modalSubmit: null,
      modalCleanup: null,
      logsPaused: false,
      logTimer: null,
      logSince: 0,
      logRows: [],
      mediaObjectUrls: [],
      mediaGeneration: 0
    };

    const eventTypes = [
      ["DYNAMIC", "动态"],
      ["LIVE_STARTED", "开播"],
      ["LIVE_ENDED", "下播"]
    ];
    const attachmentKinds = [
      ["IMAGE", "图片"],
      ["VIDEO", "视频"],
      ["CARD", "卡片"],
      ["POLL", "投票"]
    ];

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[char]));
    }
    function attr(value) { return esc(value).replace(/`/g, "&#96;"); }
    function fmtTime(value, millis) {
      if (!value) return "-";
      const date = new Date(millis ? Number(value) : Number(value) * 1000);
      return Number.isNaN(date.getTime()) ? "-" : date.toLocaleString("zh-CN", { hour12: false });
    }
    function fmtBytes(bytes) {
      const n = Number(bytes || 0);
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + " MB";
      return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
    }
    function fmtDuration(ms) {
      let seconds = Math.floor(Number(ms || 0) / 1000);
      const days = Math.floor(seconds / 86400); seconds %= 86400;
      const hours = Math.floor(seconds / 3600); seconds %= 3600;
      const minutes = Math.floor(seconds / 60);
      if (days) return `${days}天 ${hours}小时`;
      if (hours) return `${hours}小时 ${minutes}分钟`;
      return `${minutes}分钟`;
    }
    function label(value) {
      const map = {
        ACTIVE: "运行中", LOADED: "已加载", FAILED: "失败", DISABLED: "停用",
        PENDING: "等待", SENDING: "发送中", SENT: "已发送",
        SUCCESS: "已登录", CANCELED: "已取消", EXPIRED: "已过期", UNSUPPORTED: "不支持",
        COOKIE: "Cookie", QR_CODE: "二维码",
        GROUP: "群组", USER: "用户", CHANNEL: "频道", OTHER: "其他",
        DYNAMIC: "动态", LIVE_STARTED: "开播", LIVE_ENDED: "下播",
        BLOCK: "阻止", ALLOW: "允许", MENTION_ALL: "@全体", NONE: "无",
        IMAGE: "图片", VIDEO: "视频", CARD: "卡片", POLL: "投票", ORIGIN: "转发",
        OPEN: "直播中", CLOSE: "未开播", ROUND: "轮播"
      };
      return map[value] || value || "-";
    }
    function eventLabel(value) {
      return Object.fromEntries(eventTypes)[value] || value || "-";
    }
    function pill(value) {
      const text = label(value);
      const cls = ["ACTIVE", "SUCCESS", "SENT", "OPEN"].includes(value) ? "ok"
        : ["FAILED", "EXPIRED", "ERROR"].includes(value) ? "bad"
        : ["PENDING", "SENDING", "LOADED", "CANCELED", "WARN"].includes(value) ? "warn" : "info";
      return `<span class="pill ${cls}">${esc(text)}</span>`;
    }
    function tags(items) {
      const values = (items || []).filter(Boolean);
      return values.length ? `<span class="tag-list">${values.map(item => `<span class="pill">${esc(item)}</span>`).join("")}</span>` : `<span class="sub-line">-</span>`;
    }
    function cell(title, sub) {
      return `<span class="primary-line">${esc(title || "-")}</span><span class="sub-line">${esc(sub || "")}</span>`;
    }
    function mediaImage(uri, className = "avatar", platformId = "admin", kind = "OTHER") {
      if (!uri) return `<span class="${attr(className)} media-placeholder" aria-hidden="true"></span>`;
      if (/^(data|blob):/i.test(uri)) {
        return `<img class="${attr(className)}" src="${attr(uri)}" alt="" onerror="this.style.visibility='hidden'">`;
      }
      return `<img class="${attr(className)}" alt="" data-media-uri="${attr(uri)}" data-media-platform="${attr(platformId || "admin")}" data-media-kind="${attr(kind || "OTHER")}" onerror="this.style.visibility='hidden'">`;
    }
    function identity(name, sub, image, platformId = "admin", kind = "AVATAR") {
      return `<div class="identity-cell">${mediaImage(image, "avatar", platformId, kind)}<div>${cell(name, sub)}</div></div>`;
    }
    function renderTable(rows, columns) {
      if (!rows || rows.length === 0) return `<div class="empty">暂无数据</div>`;
      return `<div class="table-wrap"><table><thead><tr>${columns.map(col => `<th>${esc(col.title)}</th>`).join("")}</tr></thead><tbody>${
        rows.map(row => `<tr>${columns.map(col => `<td>${col.render(row)}</td>`).join("")}</tr>`).join("")

    function notify(message, isError) {
      const node = document.createElement("div");
      node.className = "toast" + (isError ? " error" : "");
      node.innerHTML = `<strong>${isError ? "操作失败" : "操作完成"}</strong><span>${esc(message)}</span>`;
      node.onclick = () => node.remove();
      $("toastStack").appendChild(node);
      setTimeout(() => node.remove(), isError ? 7000 : 3600);
    }
    function setLoginMessage(text, isError) {
      $("loginMessage").textContent = text || "";
      $("loginMessage").classList.toggle("error", !!isError);
    }
    function setModalMessage(text, isError) {
      $("modalMessage").textContent = text || "";
      $("modalMessage").classList.toggle("error", !!isError);
    }
    function query(params) {
      const out = new URLSearchParams();
      Object.entries(params || {}).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value).trim() !== "") out.set(key, value);
      });
      const text = out.toString();
      return text ? "?" + text : "";
    }

    async function api(path, options = {}) {
      const headers = Object.assign({ Authorization: "Bearer " + state.token }, options.headers || {});
      if (options.body && !headers["Content-Type"]) headers["Content-Type"] = "application/json";
      const response = await fetch("/api" + path, Object.assign({}, options, { headers }));
      if (response.status === 401) {
        logout("认证失败");
        throw new Error("认证失败");
      }
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) throw new Error((data && (data.message || data.error)) || "请求失败");
      return data;
    }
    async function apiBlob(path) {
      const response = await fetch("/api" + path, { headers: { Authorization: "Bearer " + state.token } });
      if (response.status === 401) {
        logout("认证失败");
        throw new Error("认证失败");
      }
      if (!response.ok) {
        let message = "资源加载失败";
        try {
          const data = await response.clone().json();
          message = data.message || data.error || message;
        } catch (_) {}
        throw new Error(message);
      }
      return response.blob();
    }
    function releaseMediaObjectUrls() {
      state.mediaGeneration += 1;
      state.mediaObjectUrls.forEach(url => URL.revokeObjectURL(url));
      state.mediaObjectUrls = [];
    }
    async function hydrateMediaImages(root = document) {
      const generation = state.mediaGeneration;
      const images = Array.from(root.querySelectorAll("img[data-media-uri]"));
      await Promise.all(images.map(async image => {
        const uri = image.dataset.mediaUri;
        if (!uri) return;
        try {
          const blob = await apiBlob("/media/image" + query({
            uri,
            platformId: image.dataset.mediaPlatform || "admin",
            kind: image.dataset.mediaKind || "OTHER"
          }));
          const url = URL.createObjectURL(blob);
          if (generation !== state.mediaGeneration || !image.isConnected) {
            URL.revokeObjectURL(url);
            return;
          }
          state.mediaObjectUrls.push(url);
          image.src = url;
          image.style.visibility = "";
        } catch (_) {
          image.style.visibility = "hidden";
          image.title = "图片加载失败";
        }
      }));
    }
    function invalidate(...keys) {
      if (keys.length === 0) state.cache = {};
      keys.forEach(key => delete state.cache[key]);

        limit: 120

      const response = await api("/logs" + query(params));
      state.logSince = response.nextSince || state.logSince;
      if (force) state.logRows = response.entries || [];
      else {
        const known = new Set(state.logRows.map(row => row.seq));
        state.logRows = state.logRows.concat((response.entries || []).filter(row => !known.has(row.seq))).slice(-200);

    function policyForm(prefix, policy, targetKind) {
      const selectedEvents = new Set(policyEvents(policy));
      const selectedMentions = new Set(mentionEvents(policy));
      const groupTarget = targetKind === "GROUP";
      return `<div class="panel">
        <div class="rule-matrix">
          ${eventTypes.map(([value, text]) => {
            const enabled = selectedEvents.has(value);
            const mention = selectedMentions.has(value);
            return `<div class="rule-row">
              <strong>${esc(text)}</strong>
              <label class="check"><input type="checkbox" name="${prefix}-event" value="${value}"${enabled ? " checked" : ""}>接收</label>
              <label class="check"><input type="checkbox" name="${prefix}-mention" value="${value}"${mention ? " checked" : ""}${groupTarget && enabled ? "" : " disabled"}>@全体</label>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }
    function wirePolicyForm(prefix, targetKindProvider) {
      const update = () => {
        const groupTarget = targetKindProvider() === "GROUP";
        eventTypes.forEach(([value]) => {
          const eventNode = document.querySelector(`input[name="${prefix}-event"][value="${value}"]`);
          const mentionNode = document.querySelector(`input[name="${prefix}-mention"][value="${value}"]`);
          if (!eventNode || !mentionNode) return;
          mentionNode.disabled = !groupTarget || !eventNode.checked;
          if (mentionNode.disabled) mentionNode.checked = false;
        });
      };
      document.querySelectorAll(`input[name="${prefix}-event"]`).forEach(node => node.onchange = update);
      update();
      return update;
    }
    function collectPolicy(prefix) {
      const enabledEvents = Array.from(document.querySelectorAll(`input[name="${prefix}-event"]:checked`)).map(item => item.value);
      const mentionAllEvents = Array.from(document.querySelectorAll(`input[name="${prefix}-mention"]:checked`))
        .filter(item => !item.disabled && enabledEvents.includes(item.value))
        .map(item => item.value);
      if (enabledEvents.length === 0) throw new Error("至少选择一种接收事件");
      return { enabledEvents, mentionAllEvents };
    }

    function renderFilterList(subscription) {

      return renderTable(rules, [

    function filterConditionTypeText(condition) {
      if (!condition) return "-";
      if (condition.type === "HAS_ATTACHMENT_KIND") return "元素";
      if (condition.type === "TEXT_CONTAINS") return "关键词";
      if (condition.type === "TEXT_REGEX") return "正则";
      if (condition.type === "HAS_REFERENCE") return "引用";
      return condition.type || "-";
    }
    function filterConditionText(condition) {
      if (!condition) return "-";
      if (condition.type === "HAS_ATTACHMENT_KIND") return label(condition.kind);
      if (condition.type === "TEXT_CONTAINS") return condition.value;
      if (condition.type === "TEXT_REGEX") return condition.pattern;
      if (condition.type === "HAS_REFERENCE") return condition.kind ? label(condition.kind) : "任意引用";
      return condition.type || JSON.stringify(condition);
    }
    function openFilterRuleModal(subscriptionId) {
      openModal("添加过滤规则", `
        <div class="form-grid">
          <div class="field"><label>类型</label><select id="filterType"><option value="HAS_ATTACHMENT_KIND">元素</option><option value="TEXT_CONTAINS">关键词</option><option value="TEXT_REGEX">正则</option><option value="HAS_REFERENCE">引用</option></select></div>
          <div class="field" id="filterElementWrap"><label>元素</label><select id="filterElement">${attachmentKinds.map(([v,t]) => `<option value="${v}">${t}</option>`).join("")}</select></div>
          <div class="field" id="filterReferenceWrap" hidden><label>引用</label><select id="filterReference"><option value="">任意引用</option><option value="REPOST">转发</option><option value="QUOTE">引用</option><option value="ORIGIN">原动态</option></select></div>
          <div class="field full" id="filterTextWrap" hidden><label>内容</label><input id="filterText"></div>
        </div>
      `, async () => {
        const condition = collectFilterCondition();
        await api(`/subscriptions/${subscriptionId}/filter-rules`, { method: "POST", body: JSON.stringify({ condition }) });
        closeModal();
        invalidate("subscriptions", "dashboard");
        await loadSubscriptions(true);
        await openSubscriptionDetail(subscriptionId);
        notify("过滤规则已添加", false);
      }, { size: "small" });
      const refresh = () => {
        const type = $("filterType").value;
        $("filterElementWrap").hidden = type !== "HAS_ATTACHMENT_KIND";
        $("filterReferenceWrap").hidden = type !== "HAS_REFERENCE";
        $("filterTextWrap").hidden = !["TEXT_CONTAINS", "TEXT_REGEX"].includes(type);
      };
      $("filterType").onchange = refresh;
      refresh();
    }
    function collectFilterCondition() {
      const type = $("filterType").value;
      if (type === "HAS_ATTACHMENT_KIND") return { type, kind: $("filterElement").value };
      if (type === "HAS_REFERENCE") return { type, kind: $("filterReference").value || null };
      const text = $("filterText").value.trim();
      if (!text) throw new Error("请填写过滤内容");
      if (type === "TEXT_REGEX") return { type, pattern: text };
      return { type, value: text, ignoreCase: true };
    }

    async function openConfigEditor(id) {
      const detail = await api(`/configs/${encodeURIComponent(id)}`);
      const sections = {};
      detail.schema.fields.forEach(field => {
        const section = field.section || "常规";
        (sections[section] = sections[section] || []).push(field);

      openModal("编辑配置：" + detail.name, Object.entries(sections).map(([name, fields]) => `
        <section class="panel">
          <div class="panel-head"><h2>${esc(name)}</h2></div>

        </section>`).join(""), async () => {
        const values = {};
        detail.schema.fields.forEach(field => values[field.path] = collectConfigField(field));
        const result = await api(`/configs/${encodeURIComponent(id)}`, { method: "PUT", body: JSON.stringify({ values }) });

        notify(result.message || "配置已保存", false);
      }, { size: "wide" });

    function configFieldHtml(detail, field) {
      const raw = detail.values[field.path];
      const value = raw === null || raw === undefined ? "" : (typeof raw === "object" ? JSON.stringify(raw, null, 2) : String(raw));
      const restart = field.restartRequired ? " · 需重启" : "";
      const labelHtml = `<label for="cfg-${attr(field.path)}">${esc(field.label)}${esc(restart)}</label>`;
      if (field.type === "BOOLEAN") {
        return `<div class="field"><label class="check"><input id="cfg-${attr(field.path)}" data-config-path="${attr(field.path)}" data-config-type="${field.type}" type="checkbox"${raw === true ? " checked" : ""}>${esc(field.label)}${esc(restart)}</label></div>`;
      }
      if (field.type === "SELECT") {
        return `<div class="field">${labelHtml}<select id="cfg-${attr(field.path)}" data-config-path="${attr(field.path)}" data-config-type="${field.type}">${(field.options || []).map(opt => `<option value="${attr(opt.value)}"${String(raw) === String(opt.value) ? " selected" : ""}>${esc(opt.label)}</option>`).join("")}</select></div>`;
      }
      if (field.type === "TEXTAREA" || field.type === "JSON") {
        return `<div class="field full">${labelHtml}<textarea id="cfg-${attr(field.path)}" data-config-path="${attr(field.path)}" data-config-type="${field.type}">${esc(value)}</textarea></div>`;
      }
      const inputType = field.type === "NUMBER" ? "number" : (field.type === "SECRET" ? "password" : "text");
      return `<div class="field">${labelHtml}<input id="cfg-${attr(field.path)}" data-config-path="${attr(field.path)}" data-config-type="${field.type}" type="${inputType}" value="${attr(value)}"></div>`;
    }
    function collectConfigField(field) {
      const node = Array.from(document.querySelectorAll("[data-config-path]")).find(item => item.dataset.configPath === field.path);
      if (!node) return null;
      if (field.type === "BOOLEAN") return node.checked;
      if (field.type === "NUMBER") return Number(node.value || 0);
      if (field.type === "JSON") return node.value.trim() ? JSON.parse(node.value) : null;
      return node.value;
    }

        await api("/dashboard");
        localStorage.setItem(tokenKey, state.token);
        showApp();
      } catch (error) {
        state.token = "";
        setLoginMessage(error.message, true);
      } finally {
        $("loginButton").disabled = false;
      }
    };
    $("logout").onclick = () => logout();
    $("refreshPage").onclick = async () => {
      invalidate();
      await loadPage(state.page, true).catch(handleError);
    };
    $("mobileMenu").onclick = () => document.body.classList.toggle("sidebar-open");
    $("modalClose").onclick = closeModal;
    $("modalCancel").onclick = closeModal;
    $("modalConfirm").onclick = submitModal;
    $("modalBackdrop").addEventListener("click", event => {
      if (event.target === $("modalBackdrop")) closeModal();
    });
    $("stopApplication").onclick = async () => {
      if (!confirm("确定停止主项目吗？")) return;
      const result = await api("/system/stop", { method: "POST" });
      notify(result.message, false);
    };

    if (state.token) {
      api("/dashboard").then(showApp).catch(() => showLogin("已保存的 token 无效", true));
    } else {
      showLogin("", false);
    }
  </script>
</body>
</html>
