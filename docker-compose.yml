version: '3.8'

services:
  dynamic-bot:
    image: ghcr.io/colter23/dynamic-bot:latest
    container_name: dynamic-bot
    restart: unless-stopped
    ports:
      - "2233:2233"
    volumes:
      # 数据持久化
      - ./data:/app/data
      # 配置文件
      - ./config:/app/config
      # 插件目录
      - ./plugins:/app/plugins
    environment:
      # JVM 内存配置，可根据实际需求调整
      - JAVA_OPTS=-Xms256m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    networks:
      - dynamic-bot-network
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2233/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

networks:
  dynamic-bot-network:
    driver: bridge
