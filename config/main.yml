---
templates:
  default: "{publisher.name} 发布了新动态\n{dynamic.text}\n{dynamic.link}"
command:
  prefix: "/db"
  permissions: []
subscription:
  unfollowWhenNoSubscribers: false
imageCache:
  sourceRoot: "data/image-cache/source"
  renderedRoot: "data/dynamic-images"
  downloadTimeoutMs: 10000
  maxConcurrentDownloads: 8
  cleanupCron: "0 4 * * *"
  sourceCleanup:
    enabled: true
    maxIdleDays: 30
  renderedCleanup:
    enabled: true
    maxIdleDays: 30
